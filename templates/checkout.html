{% extends "base.html" %}
{% block title %}Оформление заказа — Jibek{% endblock %}
{% block content %}
<a href="/cart" class="back">← Назад в корзину</a>
<div style="display:grid;grid-template-columns:1fr 300px;gap:28px;align-items:start">
  <div class="form-card" style="padding:32px">
    <div class="form-title">Оформление</div>
    <div class="form-sub">Укажи контакт для связи</div>
    <form method="post">
      <div class="form-group">
        <label>Телефон</label>
        <input type="tel" name="phone" placeholder="+7 700 000 00 00" required>
      </div>
      <div class="form-group">
        <label>Город</label>
        <input type="text" name="city" placeholder="Алматы, Астана, Шымкент..." required>
      </div>
      <div class="form-group">
        <label>Комментарий</label>
        <textarea name="comment" placeholder="Пожелания к заказу..." style="min-height:70px"></textarea>
      </div>
      <button class="btn btn-dark btn-full" type="submit" style="padding:14px;font-size:1rem">Подтвердить заказ</button>
    </form>
  </div>
  <div class="cart-summary">
    <div class="summary-title">Ваш заказ</div>
    {% for i in items %}
    <div class="summary-row">
      <span style="color:var(--muted)">{{ i.name }} × {{ i.quantity }}</span>
      <span style="font-weight:600">{{ (i.price|int)*i.quantity }} ₸</span>
    </div>
    {% endfor %}
    <div class="summary-total"><span>Итого</span><span>{{ total }} ₸</span></div>
  </div>
</div>
{% endblock %}
